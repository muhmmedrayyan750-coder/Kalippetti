<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="16" ry="16" fill="#7026b9"/>
  <!-- Inner white/light area -->
  <rect x="8" y="8" width="48" height="48" rx="12" ry="12" fill="#ffffff" opacity="0.15"/>
  <!-- Letter K - orange color -->
  <text
    x="50%"
    y="50%"
    dominant-baseline="central"
    text-anchor="middle"
    font-family="'Arial Black', 'Outfit', sans-serif"
    font-weight="900"
    font-size="38"
    fill="#ff6b00"
    letter-spacing="-1"
  >K</text>
  <!-- Decorative star/sparkle top-right -->
  <circle cx="52" cy="12" r="4" fill="#ffd000" opacity="0.9"/>
  <circle cx="12" cy="52" r="3" fill="#ff6b00" opacity="0.7"/>
</svg>